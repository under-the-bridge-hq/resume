name: Release PDF

on:
  push:
    branches:
      - main
    paths:
      - docs/README.md

jobs:
  release:
    name: tag and release pdf
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine version and create tag
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          NEXT_PATCH=$(echo "$LATEST_TAG" | awk -F. '{print $1"."$2"."$3+1}')
          DATE=$(TZ=Asia/Tokyo date '+%Y%m%d')
          echo "tag=${NEXT_PATCH}" >> "$GITHUB_OUTPUT"
          echo "name=${NEXT_PATCH}_${DATE}" >> "$GITHUB_OUTPUT"
          git tag "$NEXT_PATCH"
          git push origin "$NEXT_PATCH"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs
      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "" --destination ../_site
        working-directory: docs
      - name: Copy _site to docs/_site
        run: cp -r _site docs/_site
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run setup
      - name: Generate PDF from Jekyll HTML
        run: npm run build:pdf
      - name: Rename PDF
        run: mv docs/README.pdf "docs/resume_${{ steps.version.outputs.name }}.pdf"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: "Resume updated on ${{ steps.version.outputs.name }}"
          fail_on_unmatched_files: true
          files: docs/resume_${{ steps.version.outputs.name }}.pdf
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.name }}
