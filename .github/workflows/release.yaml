name: PDF

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/README.md

jobs:
  build:
    name: draft release for pdf
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs
      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "" --destination ../_site
        working-directory: docs
      - name: Copy _site to docs/_site
        run: cp -r _site docs/_site
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run setup
      - name: Generate PDF from Jekyll HTML
        run: npm run build:pdf
      - name: create draft
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ github.event.pull_request.title }}
          draft: true
          fail_on_unmatched_files: true
          files: docs/README.pdf
          name: Release ${{ github.ref }}
